<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Predictor de Flores Iris</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 40px;
            text-align: center;
        }
        form {
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            display: inline-block;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.1);
        }
        input[type="number"] {
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
            border: 1px solid #ccc;
            width: 90%;
        }
        input[type="submit"] {
            background-color: #333;
            color: #fff;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        input[type="submit"]:hover {
            background-color: #555;
        }
    </style>
</head>
<body>

    <h2>¡Adivina el tipo de Flor Iris! 🌸</h2>
    
    <form action="/" method="POST">
        Largo del Sépalo:<br>
        <input type="number" step="any" name="largo_sepalo" required><br>

        Ancho del Sépalo:<br>
        <input type="number" step="any" name="ancho_sepalo" required><br>

        Largo del Pétalo:<br>
        <input type="number" step="any" name="largo_petalo" required><br>

        Ancho del Pétalo:<br>
        <input type="number" step="any" name="ancho_petalo" required><br>

        <input type="submit" value="Predecir">
    </form>

    {% if prediccion %}
        <h3 style="background-color: #fff; padding: 10px; border-radius: 4px; display: inline-block; margin-top: 20px;">
            La flor predicha es: {{ prediccion }}
        </h3>
    {% endif %}

</body>
</html>
